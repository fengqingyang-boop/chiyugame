<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大鱼吃小鱼 - 海洋生存</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #000428 0%, #004e92 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
        }

        #gameCanvas {
            border: 4px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5),
                        inset 0 0 50px rgba(0, 0, 0, 0.3);
        }

        .ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            border: 2px solid #00d4ff;
            z-index: 10;
        }

        .ui-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }

        .ui-item span {
            color: #00d4ff;
            font-size: 18px;
        }

        .freeze-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(100, 149, 237, 0.3);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 10px;
        }

        .freeze-overlay.active {
            display: flex;
        }

        .freeze-message {
            font-size: 36px;
            color: #fff;
            text-shadow: 0 0 20px #6495ED, 0 0 40px #6495ED;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        .freeze-hint {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            margin-bottom: 10px;
        }

        .input-hint {
            font-size: 48px;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
            font-family: monospace;
            letter-spacing: 10px;
        }

        .input-display {
            font-size: 36px;
            color: #fff;
            margin-top: 15px;
            min-height: 50px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-screen, .game-over-screen, .level-up-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            border-radius: 10px;
        }

        .hidden {
            display: none !important;
        }

        .title {
            font-size: 48px;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #0088cc;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .instructions {
            color: #fff;
            text-align: center;
            line-height: 2;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .instructions span {
            color: #00d4ff;
            font-weight: bold;
        }

        .btn {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #00d4ff 0%, #0088cc 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }

        .final-score {
            font-size: 24px;
            color: #ffd700;
            margin: 20px 0;
        }

        .level-complete {
            font-size: 36px;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            margin-bottom: 20px;
        }

        .next-level-info {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .health-bar {
            width: 150px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            border: 2px solid #ff4444;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s ease;
        }

        .size-indicator {
            font-size: 14px;
            color: #90EE90;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        
        <div class="ui-panel">
            <div class="ui-item">
                分数: <span id="score">0</span>
            </div>
            <div class="ui-item">
                等级: <span id="level">1</span>
            </div>
            <div class="ui-item">
                <div>生命值:</div>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="ui-item size-indicator">
                体积: <span id="playerSize">1</span>
            </div>
        </div>

        <div class="freeze-overlay" id="freezeOverlay">
            <div class="freeze-message">⏸️ 时间静止 ⏸️</div>
            <div class="freeze-hint">同体积鱼相撞，所有生物被定身！</div>
            <div class="input-hint">Q W E</div>
            <div class="input-display" id="inputDisplay">_ _ _</div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1 class="title">🐟 大鱼吃小鱼 🐟</h1>
            <p class="subtitle">海洋生存法则：要么吃，要么被吃！</p>
            <div class="instructions">
                <p>🎮 <span>操作说明：</span></p>
                <p>使用 <span>鼠标</span> 或 <span>方向键</span> 控制你的鱼</p>
                <p>🐟 吃掉比你小的鱼来成长</p>
                <p>⚠️ 避开比你大的鱼</p>
                <p>💀 当生命值归零，游戏结束</p>
                <p>⚡ <span>特殊效果：</span></p>
                <p>撞上与你体积相同的鱼会触发<span>时间静止</span>！</p>
                <p>输入 <span>Q W E</span> 三个字母解除定身术</p>
            </div>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1 class="title" style="color: #ff4444;">游戏结束</h1>
            <div class="final-score">
                最终分数: <span id="finalScore">0</span>
            </div>
            <div class="final-score">
                到达等级: <span id="finalLevel">1</span>
            </div>
            <button class="btn" id="restartBtn">重新开始</button>
        </div>

        <div class="level-up-screen hidden" id="levelUpScreen">
            <div class="level-complete">🎉 等级完成！🎉</div>
            <div class="next-level-info" id="levelUpMessage">准备进入下一关</div>
            <button class="btn" id="nextLevelBtn">进入下一关</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'start';
        let score = 0;
        let level = 1;
        let health = 100;
        let isFrozen = false;
        let inputSequence = '';
        let currentInputIndex = 0;
        let player = null;
        let fishes = [];
        let particles = [];
        let bubbles = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let levelTarget = 500;

        const FISH_COLORS = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
            '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
            '#F8B500', '#FF69B4', '#00CED1', '#FF7F50', '#9370DB'
        ];

        class Fish {
            constructor(x, y, size, direction, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.baseSize = size;
                this.direction = direction;
                this.isPlayer = isPlayer;
                this.speed = this.calculateSpeed();
                this.color = FISH_COLORS[Math.floor(Math.random() * FISH_COLORS.length)];
                this.tailAngle = 0;
                this.tailSpeed = isPlayer ? 0.15 : 0.1;
                this.eyeAngle = 0;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.targetX = x;
                this.targetY = y;
                this.aiTimer = 0;
                this.aiChangeInterval = 60 + Math.random() * 120;
            }

            calculateSpeed() {
                if (this.isPlayer) return 5;
                const baseSpeed = 1.5 + level * 0.3;
                const sizeFactor = Math.max(0.5, 1.5 - this.size * 0.1);
                return baseSpeed * sizeFactor;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.direction < 0) {
                    ctx.scale(-1, 1);
                }

                const wave = Math.sin(Date.now() * 0.003 + this.waveOffset) * 2;
                const actualSize = this.baseSize;
                
                ctx.fillStyle = this.color;
                
                ctx.beginPath();
                ctx.ellipse(0, wave, actualSize * 2, actualSize, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = this.darkenColor(this.color, 30);
                ctx.beginPath();
                ctx.ellipse(0, wave + actualSize * 0.3, actualSize * 1.5, actualSize * 0.5, 0, 0, Math.PI);
                ctx.fill();

                this.tailAngle = Math.sin(Date.now() * this.tailSpeed) * 0.3;
                ctx.save();
                ctx.translate(-actualSize * 1.8, wave);
                ctx.rotate(this.tailAngle);
                ctx.fillStyle = this.darkenColor(this.color, 20);
                ctx.beginPath();
                ctx.moveTo(0, -actualSize * 0.8);
                ctx.lineTo(-actualSize * 1.2, 0);
                ctx.lineTo(0, actualSize * 0.8);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                ctx.fillStyle = this.darkenColor(this.color, 40);
                ctx.save();
                ctx.translate(actualSize * 0.5, wave - actualSize * 0.6);
                ctx.rotate(-0.3);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(actualSize * 0.8, -actualSize * 0.4);
                ctx.lineTo(actualSize * 0.8, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(actualSize * 0.8, wave, actualSize * 0.25, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                this.eyeAngle = this.isPlayer ? 0 : Math.sin(Date.now() * 0.002) * 0.1;
                ctx.beginPath();
                ctx.arc(actualSize * 0.85 + this.eyeAngle * actualSize * 0.1, wave, actualSize * 0.12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(actualSize * 0.3, wave - actualSize * 0.4, actualSize * 0.8, actualSize * 0.3, -0.3, 0, Math.PI * 2);
                ctx.fill();

                if (this.isPlayer) {
                    ctx.strokeStyle = '#00d4ff';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.ellipse(0, wave, actualSize * 2.2, actualSize * 1.2, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();

                if (isFrozen) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.fillStyle = 'rgba(100, 149, 237, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.baseSize * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            darkenColor(color, amount) {
                const hex = color.replace('#', '');
                const r = Math.max(0, parseInt(hex.substr(0, 2), 16) - amount);
                const g = Math.max(0, parseInt(hex.substr(2, 2), 16) - amount);
                const b = Math.max(0, parseInt(hex.substr(4, 2), 16) - amount);
                return `rgb(${r}, ${g}, ${b})`;
            }

            update(deltaTime) {
                if (isFrozen && !this.isPlayer) return;

                if (this.isPlayer) {
                    this.updatePlayer(deltaTime);
                } else {
                    this.updateAI(deltaTime);
                }

                this.x = Math.max(this.baseSize * 2, Math.min(canvas.width - this.baseSize * 2, this.x));
                this.y = Math.max(this.baseSize, Math.min(canvas.height - this.baseSize, this.y));
            }

            updatePlayer(deltaTime) {
                if (mousePos.x !== null && mousePos.y !== null) {
                    const dx = mousePos.x - this.x;
                    const dy = mousePos.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 5) {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                        this.direction = dx > 0 ? 1 : -1;
                    }
                }

                if (keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight) {
                    if (keys.ArrowUp) this.y -= this.speed;
                    if (keys.ArrowDown) this.y += this.speed;
                    if (keys.ArrowLeft) {
                        this.x -= this.speed;
                        this.direction = -1;
                    }
                    if (keys.ArrowRight) {
                        this.x += this.speed;
                        this.direction = 1;
                    }
                }
            }

            updateAI(deltaTime) {
                this.aiTimer++;
                
                if (this.aiTimer > this.aiChangeInterval) {
                    this.aiTimer = 0;
                    this.aiChangeInterval = 60 + Math.random() * 120;
                    
                    const margin = 100;
                    this.targetX = margin + Math.random() * (canvas.width - margin * 2);
                    this.targetY = margin + Math.random() * (canvas.height - margin * 2);
                }

                if (player) {
                    const sizeRatio = player.baseSize / this.baseSize;
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 200) {
                        if (sizeRatio > 1.3) {
                            this.targetX = this.x - dx * 0.5;
                            this.targetY = this.y - dy * 0.5;
                        } else if (sizeRatio < 0.7) {
                            this.targetX = player.x;
                            this.targetY = player.y;
                        }
                    }
                }

                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 5) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                    this.direction = dx > 0 ? 1 : -1;
                }

                if (this.x < this.baseSize * 3) {
                    this.direction = 1;
                    this.targetX = this.x + 100;
                }
                if (this.x > canvas.width - this.baseSize * 3) {
                    this.direction = -1;
                    this.targetX = this.x - 100;
                }
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    radius: this.baseSize * 1.5
                };
            }
        }

        class Particle {
            constructor(x, y, color, type = 'eat') {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 5;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.95;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = 2 + Math.random() * 6;
                this.speed = 0.5 + Math.random() * 1.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = 0.3 + Math.sin(this.wobble * 2) * 0.1;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        const mousePos = { x: null, y: null };
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
            }
            
            if (isFrozen) {
                const key = e.key.toLowerCase();
                const targetKeys = ['q', 'w', 'e'];
                
                if (key === targetKeys[currentInputIndex]) {
                    inputSequence += key;
                    currentInputIndex++;
                    updateInputDisplay();
                    
                    if (currentInputIndex >= 3) {
                        unfreezeGame();
                    }
                } else if (key === 'q' || key === 'w' || key === 'e') {
                    inputSequence = key;
                    currentInputIndex = key === 'q' ? 1 : 0;
                    if (key !== 'q') {
                        inputSequence = '';
                        currentInputIndex = 0;
                    }
                    updateInputDisplay();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);

        function updateInputDisplay() {
            const display = document.getElementById('inputDisplay');
            let result = '';
            const target = 'qwe';
            
            for (let i = 0; i < 3; i++) {
                if (i < inputSequence.length) {
                    if (inputSequence[i] === target[i]) {
                        result += `<span style="color: #00ff00;">${inputSequence[i].toUpperCase()}</span>`;
                    } else {
                        result += `<span style="color: #ff4444;">${inputSequence[i].toUpperCase()}</span>`;
                    }
                } else {
                    result += '_';
                }
                if (i < 2) result += ' ';
            }
            display.innerHTML = result;
        }

        function createEatingParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color, 'eat'));
            }
        }

        function createDamageParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y, '#ff4444', 'damage'));
            }
        }

        function createFreezeEffect(fish1, fish2) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(
                    (fish1.x + fish2.x) / 2 + (Math.random() - 0.5) * 100,
                    (fish1.y + fish2.y) / 2 + (Math.random() - 0.5) * 100,
                    '#6495ED',
                    'freeze'
                ));
            }
        }

        function checkCollision(fish1, fish2) {
            const b1 = fish1.getBounds();
            const b2 = fish2.getBounds();
            const dx = b1.x - b2.x;
            const dy = b1.y - b2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < b1.radius + b2.radius;
        }

        function freezeGame(fish1, fish2) {
            isFrozen = true;
            inputSequence = '';
            currentInputIndex = 0;
            document.getElementById('freezeOverlay').classList.add('active');
            updateInputDisplay();
            createFreezeEffect(fish1, fish2);
        }

        function unfreezeGame() {
            isFrozen = false;
            inputSequence = '';
            currentInputIndex = 0;
            document.getElementById('freezeOverlay').classList.remove('active');
            score += 50;
            updateUI();
        }

        function spawnFish() {
            const sizeGroups = [
                { min: 5, max: 10, weight: 40 },
                { min: 10, max: 15, weight: 30 },
                { min: 15, max: 25, weight: 20 },
                { min: 25, max: 40, weight: 10 }
            ];

            if (level >= 3) {
                sizeGroups.push({ min: 40, max: 60, weight: 5 });
            }

            const totalWeight = sizeGroups.reduce((sum, g) => sum + g.weight, 0);
            let random = Math.random() * totalWeight;
            let selectedGroup = sizeGroups[0];
            
            for (const group of sizeGroups) {
                random -= group.weight;
                if (random <= 0) {
                    selectedGroup = group;
                    break;
                }
            }

            const size = selectedGroup.min + Math.random() * (selectedGroup.max - selectedGroup.min);
            const fromLeft = Math.random() > 0.5;
            
            const x = fromLeft ? -size * 3 : canvas.width + size * 3;
            const y = 50 + Math.random() * (canvas.height - 100);
            const direction = fromLeft ? 1 : -1;

            const fish = new Fish(x, y, size, direction);
            fish.targetX = fromLeft ? canvas.width + 100 : -100;
            fish.targetY = y;
            
            fishes.push(fish);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('playerSize').textContent = Math.floor(player ? player.baseSize : 1);
            document.getElementById('healthFill').style.width = `${health}%`;
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#001a33');
            gradient.addColorStop(0.5, '#003366');
            gradient.addColorStop(1, '#004d99');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for (let i = 0; i < 20; i++) {
                const x = (Date.now() * 0.01 + i * 100) % (canvas.width + 200) - 100;
                const y = 100 + i * 30;
                ctx.beginPath();
                ctx.arc(x, y, 30 + Math.sin(Date.now() * 0.001 + i) * 10, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();

            ctx.save();
            ctx.fillStyle = 'rgba(0, 100, 150, 0.5)';
            for (let i = 0; i < 10; i++) {
                const x = i * 100 + Math.sin(Date.now() * 0.001 + i) * 20;
                const height = 50 + Math.sin(Date.now() * 0.002 + i * 0.5) * 20;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height);
                ctx.quadraticCurveTo(x + 15, canvas.height - height, x + 30, canvas.height);
                ctx.fill();
            }
            ctx.restore();
        }

        function gameLoop(currentTime) {
            if (gameState !== 'playing') {
                requestAnimationFrame(gameLoop);
                return;
            }

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            if (Math.random() < 0.03) {
                bubbles.push(new Bubble());
            }
            bubbles = bubbles.filter(b => b.y > -20);
            bubbles.forEach(b => {
                b.update();
                b.draw();
            });

            if (!isFrozen) {
                spawnTimer += deltaTime;
                const spawnInterval = Math.max(500, 2000 - level * 150);
                if (spawnTimer > spawnInterval && fishes.length < 15 + level * 3) {
                    spawnTimer = 0;
                    spawnFish();
                }
            }

            fishes = fishes.filter(fish => {
                const margin = 100;
                return fish.x > -margin && fish.x < canvas.width + margin &&
                       fish.y > -margin && fish.y < canvas.height + margin;
            });

            fishes.forEach(fish => {
                fish.update(deltaTime);
            });

            if (player) {
                player.update(deltaTime);

                for (let i = fishes.length - 1; i >= 0; i--) {
                    const fish = fishes[i];
                    
                    if (checkCollision(player, fish)) {
                        const sizeRatio = fish.baseSize / player.baseSize;
                        
                        const freezeMinRatio = 0.85;
                        const freezeMaxRatio = 1.18;
                        const eatMaxRatio = 0.75;
                        
                        if (sizeRatio >= freezeMinRatio && sizeRatio <= freezeMaxRatio && !isFrozen) {
                            freezeGame(player, fish);
                        } else if (sizeRatio <= eatMaxRatio) {
                            createEatingParticles(fish.x, fish.y, fish.color);
                            score += Math.floor(fish.baseSize * 10);
                            
                            const growthAmount = fish.baseSize * 0.1;
                            player.baseSize = Math.min(100, player.baseSize + growthAmount);
                            player.speed = player.calculateSpeed();
                            
                            fishes.splice(i, 1);
                            updateUI();

                            if (score >= levelTarget) {
                                levelUp();
                            }
                        } else if (sizeRatio > freezeMaxRatio) {
                            if (!isFrozen) {
                                createDamageParticles(player.x, player.y);
                                health -= 15;
                                
                                const pushDir = player.x > fish.x ? 1 : -1;
                                player.x += pushDir * 30;
                                
                                updateUI();

                                if (health <= 0) {
                                    gameOver();
                                }
                            }
                        }
                    }
                }
            }

            if (!isFrozen) {
                for (let i = 0; i < fishes.length; i++) {
                    for (let j = i + 1; j < fishes.length; j++) {
                        const fish1 = fishes[i];
                        const fish2 = fishes[j];
                        
                        if (checkCollision(fish1, fish2)) {
                            const sizeRatio = fish1.baseSize / fish2.baseSize;
                            
                            if (sizeRatio > 1.3) {
                                createEatingParticles(fish2.x, fish2.y, fish2.color);
                                fish1.baseSize = Math.min(100, fish1.baseSize + fish2.baseSize * 0.05);
                                fish1.speed = fish1.calculateSpeed();
                                fishes.splice(j, 1);
                                j--;
                            } else if (sizeRatio < 0.7) {
                                createEatingParticles(fish1.x, fish1.y, fish1.color);
                                fish2.baseSize = Math.min(100, fish2.baseSize + fish1.baseSize * 0.05);
                                fish2.speed = fish2.calculateSpeed();
                                fishes.splice(i, 1);
                                i--;
                                break;
                            }
                        }
                    }
                }
            }

            fishes.forEach(fish => fish.draw());
            if (player) player.draw();

            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0;
            level = 1;
            health = 100;
            isFrozen = false;
            inputSequence = '';
            fishes = [];
            particles = [];
            bubbles = [];
            spawnTimer = 0;
            levelTarget = 500;
            gameState = 'playing';

            player = new Fish(canvas.width / 2, canvas.height / 2, 10, 1, true);

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('levelUpScreen').classList.add('hidden');
            document.getElementById('freezeOverlay').classList.remove('active');

            updateUI();
            lastTime = performance.now();
        }

        function levelUp() {
            gameState = 'levelUp';
            level++;
            levelTarget += 500 * level;
            health = Math.min(100, health + 30);

            document.getElementById('levelUpMessage').textContent = 
                `进入第 ${level} 关！敌人数量增加，速度加快！`;
            document.getElementById('levelUpScreen').classList.remove('hidden');
            
            updateUI();
        }

        function nextLevel() {
            document.getElementById('levelUpScreen').classList.add('hidden');
            gameState = 'playing';
            lastTime = performance.now();
        }

        function gameOver() {
            gameState = 'gameOver';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
